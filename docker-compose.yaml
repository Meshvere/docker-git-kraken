services:
    gitkraken:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: gitkraken-vnc
        ports:
            - "6080:6080"  # noVNC (accès web)
            - "5900:5900"  # VNC direct (optionnel)
        volumes:
            - ./supervisord.conf:/etc/supervisor/supervisord.conf
            - ./datas:/root/.gitkraken
            - ./../:/workspace
            - ./../.ssh:/ssh:ro
        shm_size: '4gb'
        security_opt:
            - seccomp:unconfined
        cap_add:
            - SYS_ADMIN
        entrypoint: [ "/bin/bash", "/entrypoint.sh" ]
