[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:dbus]
command=/usr/bin/dbus-daemon --system --nofork --nopidfile
user=root
autorestart=true
priority=1
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
startsecs=2

[program:xvfb]
command=/usr/bin/Xvfb :0 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
user=smanetagis
autorestart=true
priority=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
startsecs=5

[program:x11vnc]
command=bash -c 'sleep 3 && /usr/bin/x11vnc -display :0 -forever -shared -nopw -xkb'
user=smanetagis
autorestart=true
priority=20
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
startsecs=3

[program:gitkraken]
command=bash -c 'sleep 5 && /usr/share/gitkraken/gitkraken --no-sandbox'
user=smanetagis
directory=/home/smanetagis
environment=DISPLAY=":0",HOME="/home/smanetagis",DBUS_SESSION_BUS_ADDRESS="unix:path=/run/dbus/system_bus_socket"
autorestart=true
priority=30
startretries=5
startsecs=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
