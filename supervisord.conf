[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:dbus]
command=/usr/bin/dbus-daemon --system --nofork --nopidfile
user=root
autorestart=true
priority=1
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:tigervnc]
command=/usr/bin/Xtigervnc :0   -SecurityTypes None   -localhost no   -geometry 1900x950   -depth 24   -AlwaysShared
user=smanetagis
autorestart=true
priority=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:openbox]
command=/usr/bin/openbox-session
user=smanetagis
environment=DISPLAY=":0",HOME="/home/smanetagis"
autorestart=true
priority=20
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:gitkraken]
command=bash -c 'sleep 5 && /usr/share/gitkraken/gitkraken --no-sandbox && sleep 5 && wmctrl -r "GitKraken" -b add,fullscreen'
user=smanetagis
directory=/home/smanetagis
environment=DISPLAY=":0",HOME="/home/smanetagis",DBUS_SESSION_BUS_ADDRESS="unix:path=/run/dbus/system_bus_socket"
autorestart=true
priority=30
startsecs=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

